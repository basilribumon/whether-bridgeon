<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Weather Dashboard</title>

    <style>

        /* Interns: Add your CSS here */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { font-family: Arial, sans-serif; background: #f0f2f5; }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Add more styles... */

    </style>

</head>

<body>

    <div class="container">

        <!-- Theme Toggle -->

        <div class="theme-toggle">

            <button id="themeBtn">🌙 Dark</button>

        </div>



        <!-- Search Section -->

        <div class="search-section">

            <input type="text" id="cityInput" placeholder="Enter city name..." />

            <button id="searchBtn">Search Weather</button>

        </div>



        <!-- Weather Display -->

        <div id="weatherCard" class="weather-card" style="display: none;"></div>

        

        <!-- Error Message -->

        <div id="errorMsg" class="error" style="display: none;"></div>



        <!-- Favorites -->

        <div class="favorites-section">

            <h3>Favorites</h3>

            <div id="favoritesList"></div>

        </div>

    </div>



    <script>

      const API_KEY = 'd64ae7753197722c5947e1ee8246a2e0';
let debounceTimer;

// 1. Fetch weather data from OpenWeatherMap
async function getWeather(city) {
    const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${API_KEY}`);
    if (!response.ok) throw new Error('City not found');
    return await response.json();
}

// 2. Add city to localStorage
function addFavorite(city) {
    let favorites = JSON.parse(localStorage.getItem('weatherFavs')) || [];
    if (!favorites.includes(city)) {
        favorites.push(city);
        localStorage.setItem('weatherFavs', JSON.stringify(favorites));
        loadFavorites();
    }
}

// 3. Display favorites from localStorage
function loadFavorites() {
    const favoritesList = document.getElementById('favoritesList');
    const favorites = JSON.parse(localStorage.getItem('weatherFavs')) || [];
    
    favoritesList.innerHTML = favorites.map(city => `
        <button class="fav-btn" onclick="searchWeather('${city}')">${city}</button>
    `).join('');
}

// 4. Main search function
async function searchWeather(city) {
    const weatherCard = document.getElementById('weatherCard');
    const errorMsg = document.getElementById('errorMsg');
    const cityInput = document.getElementById('cityInput');
    
    const searchCity = city || cityInput.value;
    if (!searchCity) return;

    try {
        errorMsg.style.display = 'none';
        const data = await getWeather(searchCity);
        
        weatherCard.style.display = 'block';
        weatherCard.innerHTML = `
            <h2>${data.name}, ${data.sys.country}</h2>
            <p class="temp">${Math.round(data.main.temp)}°C</p>
            <p>${data.weather[0].description}</p>
            <button onclick="addFavorite('${data.name}')">⭐ Add to Favorites</button>
        `;
    } catch (err) {
        weatherCard.style.display = 'none';
        errorMsg.style.display = 'block';
        errorMsg.innerText = err.message;
    }
}

// 5. Debounce logic to prevent too many API calls while typing
function debounceSearch() {
    clearTimeout(debounceTimer);
    const city = document.getElementById('cityInput').value;
    if (city.length < 3) return; // Wait for at least 3 chars
    
    debounceTimer = setTimeout(() => {
        searchWeather(city);
    }, 500);
}

// 6. Event Listeners
document.addEventListener('DOMContentLoaded', function() {
    const searchBtn = document.getElementById('searchBtn');
    const cityInput = document.getElementById('cityInput');
    const themeBtn = document.getElementById('themeBtn');

    searchBtn.addEventListener('click', () => searchWeather());
    
    // Wire up the debounce to the input field
    cityInput.addEventListener('input', debounceSearch);

    // Bonus: Simple Theme Toggle
    themeBtn.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        themeBtn.innerText = document.body.classList.contains('dark-mode') ? '☀️ Light' : '🌙 Dark';
    });

    loadFavorites();
});

    </script>

</body>

</html>
