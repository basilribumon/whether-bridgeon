<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        :root {
            --bg: linear-gradient(180deg, #dbeafe 0%, #eff6ff 45%, #f8fafc 100%);
            --surface: rgba(255, 255, 255, 0.92);
            --surface-strong: #ffffff;
            --text: #10233f;
            --muted: #5b6b82;
            --primary: #1d4ed8;
            --primary-hover: #1e40af;
            --border: rgba(148, 163, 184, 0.25);
            --shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
            --error-bg: #fee2e2;
            --error-text: #b91c1c;
            --fav-color: #0f766e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 16px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 28px;
            background: var(--surface);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        .search-section {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 12px;
            margin-bottom: 20px;
        }

        #cityInput, #searchBtn, #themeBtn, #favoritesList button, .add-fav-btn {
            border-radius: 14px;
            font-size: 1rem;
            border: 1px solid transparent;
            transition: 0.2s ease;
        }

        #cityInput {
            padding: 14px 16px;
            background: var(--surface-strong);
            border-color: var(--border);
            color: var(--text);
            outline: none;
        }

        #cityInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
        }

        #searchBtn, #themeBtn {
            padding: 12px 16px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
        }

        .add-fav-btn {
            margin-top: 15px;
            padding: 8px 16px;
            background: var(--fav-color);
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #searchBtn:hover, #themeBtn:hover, .add-fav-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .weather-card, .favorites-section, .error {
            border-radius: 20px;
            padding: 20px;
            margin-top: 18px;
        }

        .weather-card, .favorites-section {
            background: var(--surface-strong);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .weather-card h2 { font-size: 1.8rem; }
        .weather-card p { margin-top: 8px; color: var(--muted); }

        .error {
            background: var(--error-bg);
            color: var(--error-text);
            border: 1px solid rgba(185, 28, 28, 0.18);
        }

        .favorites-section h3 { margin-bottom: 14px; font-size: 1.15rem; }

        #favoritesList {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            color: var(--muted);
        }

        #favoritesList button {
            padding: 8px 14px;
            background: var(--fav-color);
            color: white;
            cursor: pointer;
        }

        body.dark-theme {
            --bg: linear-gradient(180deg, #0f172a 0%, #111827 50%, #1e293b 100%);
            --surface: rgba(15, 23, 42, 0.88);
            --surface-strong: #162033;
            --text: #e5eefc;
            --muted: #b8c4d9;
            --primary: #60a5fa;
            --border: rgba(148, 163, 184, 0.2);
            --fav-color: #14b8a6;
        }

        @media (max-width: 640px) {
            .search-section { grid-template-columns: 1fr; }
            #searchBtn, #themeBtn, #favoritesList button { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="theme-toggle">
        <button id="themeBtn">🌙 Dark</button>
    </div>

    <div class="search-section">
        <input type="text" id="cityInput" placeholder="Enter city name..." />
        <button id="searchBtn">Search Weather</button>
    </div>

    <div id="weatherCard" class="weather-card" style="display: none;"></div>
    <div id="errorMsg" class="error" style="display: none;"></div>

    <div class="favorites-section">
        <h3>Favorites</h3>
        <div id="favoritesList"></div>
    </div>
</div>

<script>
    const API_KEY = 'd64ae7753197722c5947e1ee8246a2e0';
    const FAVORITES_STORAGE_KEY = 'favorites';

    async function getWeather(city) {
        const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
        if (!response.ok) throw new Error('City not found');
        return response.json();
    }

    function addFavorite(city) {
        const normalizedCity = (city || '').trim();
        if (!normalizedCity) return;

        const favorites = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || '[]');
        const cityExists = favorites.some(fav => fav.toLowerCase() === normalizedCity.toLowerCase());

        if (!cityExists) {
            favorites.push(normalizedCity);
            localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(favorites));
            loadFavorites(); // Refresh the list immediately
        }
    }

    function loadFavorites() {
        const favoritesList = document.getElementById('favoritesList');
        const favorites = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || '[]');
        
        favoritesList.innerHTML = '';

        if (favorites.length === 0) {
            favoritesList.textContent = 'No favorites saved yet.';
            return;
        }

        favorites.forEach(city => {
            const button = document.createElement('button');
            button.textContent = city;
            button.onclick = () => searchWeather(city);
            favoritesList.appendChild(button);
        });
    }

    async function searchWeather(city) {
        const weatherCard = document.getElementById('weatherCard');
        const errorMsg = document.getElementById('errorMsg');
        
        if (!city.trim()) return;

        errorMsg.style.display = 'none';
        weatherCard.style.display = 'block';
        weatherCard.innerHTML = 'Loading...';

        try {
            const data = await getWeather(city);
            weatherCard.innerHTML = `
                <h2>${data.name}, ${data.sys.country}</h2>
                <p><strong>Temperature:</strong> ${Math.round(data.main.temp)}°C</p>
                <p><strong>Condition:</strong> ${data.weather[0].description}</p>
                <p><strong>Humidity:</strong> ${data.main.humidity}%</p>
                <button class="add-fav-btn" onclick="addFavorite('${data.name}')">⭐ Add to Favorites</button>
            `;
        } catch (error) {
            weatherCard.style.display = 'none';
            errorMsg.style.display = 'block';
            errorMsg.textContent = error.message;
        }
    }

    // Debounce logic
    let timeout;
    function debouncedSearch(val) {
        clearTimeout(timeout);
        timeout = setTimeout(() => searchWeather(val), 800);
    }

    document.addEventListener('DOMContentLoaded', () => {
        const cityInput = document.getElementById('cityInput');
        
        document.getElementById('searchBtn').onclick = () => searchWeather(cityInput.value);
        
        cityInput.oninput = (e) => {
            if(e.target.value.length > 2) debouncedSearch(e.target.value);
        };

        document.getElementById('themeBtn').onclick = function() {
            const isDark = document.body.classList.toggle('dark-theme');
            this.textContent = isDark ? '☀️ Light' : '🌙 Dark';
        };

        loadFavorites();
    });
</script>

</body>
</html>
