<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="index.css">
</head>
<body class="dark-theme">
    <div class="dashboard-card">
        <div class="header">
            <button id="theme-toggle" class="mode-btn">☀️ Light Mode</button>
        </div>

        <div class="search-container">
            <input type="text" id="city-input" placeholder="Enter city name... (e.g., London)">
            <button id="search-btn">Search Weather</button>
        </div>

        <div id="loader" class="hidden"></div>
        <div id="error-msg" class="error hidden">City not found. Please try again.</div>

        <div id="weather-content" class="hidden">
            <div class="current-card">
                <div class="info">
                    <h2 id="city-name">City</h2>
                    <h1 id="curr-temp">--°C</h1>
                    <p id="curr-desc">Cloudy</p>
                </div>
                <button id="add-fav-btn" class="fav-action-btn">★ Favorite</button>
            </div>
            
            <div class="forecast-grid" id="forecast-container">
                </div>
        </div>

        <div class="favorites-section">
            <h3>Favorites</h3>
            <hr>
            <div id="fav-list" class="fav-tags">
                <p id="no-fav-text">No favorites added yet.</p>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
