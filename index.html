<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Dashboard</title>

<style>
:root {
--bg: linear-gradient(180deg, #dbeafe 0%, #eff6ff 45%, #f8fafc 100%);
--surface: rgba(255, 255, 255, 0.92);
--surface-strong: #ffffff;
--text: #10233f;
--muted: #5b6b82;
--primary: #1d4ed8;
--primary-hover: #1e40af;
--border: rgba(148, 163, 184, 0.25);
--shadow: 0 20px 45px rgba(15, 23, 42, 0.12);
--error-bg: #fee2e2;
--error-text: #b91c1c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: Arial, sans-serif;
background: var(--bg);
color: var(--text);
min-height: 100vh;
padding: 32px 16px;
}

.container {
max-width: 720px;
margin: 0 auto;
padding: 28px;
background: var(--surface);
backdrop-filter: blur(10px);
border: 1px solid var(--border);
border-radius: 24px;
box-shadow: var(--shadow);
}

.theme-toggle {
display: flex;
justify-content: flex-end;
margin-bottom: 24px;
}

.search-section {
display: grid;
grid-template-columns: minmax(0, 1fr) auto;
gap: 12px;
margin-bottom: 20px;
}

#cityInput,
#searchBtn,
#themeBtn,
#favoritesList button {
border-radius: 14px;
font-size: 1rem;
border: 1px solid transparent;
transition: 0.2s ease;
}

#cityInput {
padding: 14px 16px;
background: var(--surface-strong);
border-color: var(--border);
color: var(--text);
outline: none;
}

#cityInput:focus {
border-color: var(--primary);
box-shadow: 0 0 0 4px rgba(29, 78, 216, 0.14);
}

#searchBtn,
#themeBtn,
#favoritesList button {
padding: 12px 16px;
background: var(--primary);
color: #fff;
cursor: pointer;
font-weight: 600;
}

#searchBtn:hover,
#themeBtn:hover,
#favoritesList button:hover {
background: var(--primary-hover);
transform: translateY(-1px);
}

.weather-card,
.favorites-section,
.error {
border-radius: 20px;
padding: 20px;
margin-top: 18px;
}

.weather-card,
.favorites-section {
background: var(--surface-strong);
border: 1px solid var(--border);
box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
}

.weather-card h2 {
margin-bottom: 10px;
font-size: 1.8rem;
}

.weather-card p {
margin-top: 8px;
color: var(--muted);
}

.error {
background: var(--error-bg);
color: var(--error-text);
border: 1px solid rgba(185, 28, 28, 0.18);
}

.favorites-section h3 {
margin-bottom: 14px;
font-size: 1.15rem;
}

#favoritesList {
display: flex;
flex-wrap: wrap;
gap: 10px;
color: var(--muted);
}

#favoritesList button {
background: #0f766e;
}

#favoritesList button:hover {
background: #115e59;
}

body.dark-theme {
--bg: linear-gradient(180deg, #0f172a 0%, #111827 50%, #1e293b 100%);
--surface: rgba(15, 23, 42, 0.88);
--surface-strong: #162033;
--text: #e5eefc;
--muted: #b8c4d9;
--primary: #60a5fa;
--primary-hover: #3b82f6;
--border: rgba(148, 163, 184, 0.2);
--shadow: 0 20px 45px rgba(2, 6, 23, 0.45);
--error-bg: rgba(127, 29, 29, 0.38);
--error-text: #fecaca;
}

@media (max-width: 640px) {
.container {
padding: 20px;
border-radius: 20px;
}

.search-section {
grid-template-columns: 1fr;
}

#searchBtn,
#themeBtn,
#favoritesList button {
width: 100%;
}

.theme-toggle {
justify-content: stretch;
}
}

</style>

</head>

<body>

<div class="container">

<!-- Theme Toggle -->

<div class="theme-toggle">

<button id="themeBtn">🌙 Dark</button>

</div>

<!-- Search Section -->

<div class="search-section">

<input type="text" id="cityInput" placeholder="Enter city name..." />

<button id="searchBtn">Search Weather</button>

</div>

<!-- Weather Display -->

<div id="weatherCard" class="weather-card" style="display: none;"></div>

<!-- Error Message -->

<div id="errorMsg" class="error" style="display: none;"></div>

<!-- Favorites -->

<div class="favorites-section">

<h3>Favorites</h3>

<div id="favoritesList"></div>

</div>

</div>

<script>

// REPLACE THIS with your OpenWeatherMap API key (FREE signup)

const API_KEY = 'd64ae7753197722c5947e1ee8246a2e0';

// 1. IMPLEMENT getWeather(city) - Fetch API + async/await

async function getWeather(city) {
const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`);
if (!response.ok) {
throw new Error('Failed to fetch weather data');
}
return response.json();

}

const FAVORITES_STORAGE_KEY = 'favorites';

async function addFavorite(city) {
const normalizedCity = (city || '').trim();
if (!normalizedCity) {
return;
}

const favorites = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || '[]');
const cityExists = favorites.some(favorite => favorite.toLowerCase() === normalizedCity.toLowerCase());

if (!cityExists) {
favorites.push(normalizedCity);
localStorage.setItem(FAVORITES_STORAGE_KEY, JSON.stringify(favorites));
}

}

function loadFavorites() {
const favoritesList = document.getElementById('favoritesList');
if (!favoritesList) {
return;
}

const favorites = JSON.parse(localStorage.getItem(FAVORITES_STORAGE_KEY) || '[]');
favoritesList.textContent = '';

if (!favorites.length) {
favoritesList.textContent = 'No favorites saved yet.';
return;
}

const fragment = document.createDocumentFragment();

for (const city of favorites) {
const button = document.createElement('button');
button.type = 'button';
button.textContent = city;
button.addEventListener('click', function() {
searchWeather(city);
});
fragment.appendChild(button);
}

favoritesList.appendChild(fragment);

}

// 4. IMPLEMENT searchWeather()

async function searchWeather(city) {
const weatherCard = document.getElementById('weatherCard');
const errorMsg = document.getElementById('errorMsg');
const normalizedCity = city.trim();

if (!normalizedCity) {
if (weatherCard) {
weatherCard.style.display = 'none';
}
if (errorMsg) {
errorMsg.textContent = 'Please enter a city name.';
errorMsg.style.display = 'block';
}
return;
}

if (errorMsg) {
errorMsg.style.display = 'none';
errorMsg.textContent = '';
}

if (weatherCard) {
weatherCard.style.display = 'block';
weatherCard.textContent = 'Loading weather...';
}

try {
const weather = await getWeather(normalizedCity);

if (weatherCard) {
weatherCard.innerHTML = `
<h2>${weather.name}</h2>
<p>Temperature: ${weather.main.temp}°C</p>
<p>Condition: ${weather.weather[0].description}</p>
<p>Humidity: ${weather.main.humidity}%</p>
<p>Wind Speed: ${weather.wind.speed} m/s</p>
`;
}
} catch (error) {
if (weatherCard) {
weatherCard.style.display = 'none';
}
if (errorMsg) {
errorMsg.textContent = error.message || 'Unable to load weather data.';
errorMsg.style.display = 'block';
}
}

}

// 5. IMPLEMENT debounceSearch()

function debounceSearch() {
let timeoutId;

return function(city) {
clearTimeout(timeoutId);
timeoutId = setTimeout(function() {
searchWeather(city);
}, 500);
};
}

// 6. Event Listeners (wire up buttons/inputs)

document.addEventListener('DOMContentLoaded', function() {
const cityInput = document.getElementById('cityInput');
const searchBtn = document.getElementById('searchBtn');
const themeBtn = document.getElementById('themeBtn');
const debouncedSearch = debounceSearch();

if (searchBtn && cityInput) {
searchBtn.addEventListener('click', function() {
searchWeather(cityInput.value);
});
}

if (cityInput) {
cityInput.addEventListener('keydown', function(event) {
if (event.key === 'Enter') {
searchWeather(cityInput.value);
}
});

cityInput.addEventListener('input', function() {
debouncedSearch(cityInput.value);
});
}

if (themeBtn) {
themeBtn.addEventListener('click', function() {
const isDark = document.body.classList.toggle('dark-theme');
themeBtn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
});
}

loadFavorites();

});

// Export functions for button onclick (temporary)

window.searchWeather = searchWeather;

window.addFavorite = addFavorite;

</script>

</body>

</html>
